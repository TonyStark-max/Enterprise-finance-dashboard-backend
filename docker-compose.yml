services:
  db:
    image: postgres:16-alpine
    container_name: finance-dashboard-db
    environment:
      POSTGRES_DB: zorvyn
      POSTGRES_USER: somu
      POSTGRES_PASSWORD: somu1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U somu -d zorvyn"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-dashboard-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/zorvyn
      DB_USERNAME: somu
      DB_PASSWORD: somu1234
      DB_DRIVER: org.postgresql.Driver
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
